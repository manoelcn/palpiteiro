{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title mb-4">🎯 Fazer Palpite</h3>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        {% include 'components/_form_field.html' with field=field %}
                    {% endfor %}
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-success">Salvar Palpite</button>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
