{% if messages %}
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1055;">
        {% for message in messages %}
            <div class="toast align-items-center text-bg-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} border-0" 
                 role="alert" 
                 aria-live="assertive" 
                 aria-atomic="true" 
                 data-bs-delay="4000"> <div class="d-flex">
                    <div class="toast-body fw-semibold fs-6">
                        {% if message.tags == 'success' %}✅{% elif message.tags == 'error' %}⚠️{% endif %}
                        {{ message }}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Fechar"></button>
                </div>
            </div>
        {% endfor %}
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var toastElList = [].slice.call(document.querySelectorAll('.toast'));
            var toastList = toastElList.map(function(toastEl) {
                return new bootstrap.Toast(toastEl);
            });
            // Dispara a animação de exibir para cada mensagem gerada pelo Django
            toastList.forEach(toast => toast.show());
        });
    </script>
{% endif %}
