{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title mb-4">🏆 Criar Novo Bolão</h3>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    {% include 'components/_form_field.html' with field=field %}
                    {% endfor %}
                    <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
                        <button type="submit" class="btn btn-success w-100">Criar Bolão</button>
                        <a href="{% url 'group-list' %}"
                            class="btn btn-outline-secondary w-100 text-center">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
