<div class="card shadow-sm mb-3">
    <div class="card-body d-flex justify-content-between align-items-center">
        <div>
            <h5 class="card-title mb-1">{{ group.name }}</h5>
            <small class="text-muted">Código: <strong>{{ group.invite_code }}</strong></small>
        </div>
        <div class="d-flex gap-2">
            <a href="{% url 'group-detail' group.pk %}" class="btn btn-success btn-sm">Ver grupo</a>
            {% if user == group.owner %}
                <a href="{% url 'group-update' group.pk %}" class="btn btn-outline-secondary btn-sm">Editar</a>
            {% endif %}
        </div>
    </div>
</div>
