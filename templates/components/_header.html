<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">⚽ Bolão da Copa</a>
        <div class="navbar-nav ms-auto d-flex align-items-center flex-row">
            {% if user.is_authenticated %}
                <span class="navbar-text text-white me-3">Olá, {{ user.username }}!</span>
                <form method="post" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">Sair</button>
                </form>
            {% else %}
                <a class="btn btn-outline-light btn-sm me-2" href="{% url 'login' %}">Entrar</a>
                <a class="btn btn-light btn-sm" href="{% url 'register' %}">Cadastrar</a>
            {% endif %}
        </div>
    </div>
</nav>
