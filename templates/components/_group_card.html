<div class="card shadow-sm mb-3">
    <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
        <div>
            <h5 class="card-title mb-1">{{ group.name }}</h5>
            <small class="text-muted">Código: <strong>{{ group.invite_code }}</strong></small>
        </div>
        
        <div class="d-flex flex-wrap gap-2 w-100 w-md-auto">
            <a href="{% url 'group-detail' group.pk %}" class="btn btn-success btn-sm flex-fill">Ver grupo</a>
            {% if user == group.owner %}
                <a href="{% url 'group-update' group.pk %}" class="btn btn-outline-secondary btn-sm flex-fill">Editar</a>
                <a href="{% url 'group-delete' group.pk %}" class="btn btn-outline-danger btn-sm flex-fill">Excluir</a>
            {% else %}
                <a href="{% url 'group-leave' group.my_membership.pk %}" class="btn btn-outline-danger btn-sm flex-fill">Sair</a>
            {% endif %}
        </div>
    </div>
</div>
