{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-danger">
            <div class="card-body p-4 text-center">
                <h3 class="card-title mb-3">😔 Sair do Bolão</h3>
                <p class="text-muted mb-4">Tem certeza que deseja sair do bolão <strong>{{ object.group.name }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-danger">Sim, quero sair</button>
                        <a href="{% url 'group-list' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
