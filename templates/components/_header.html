<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">⚽ Bolão da Copa</a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">
            <div class="navbar-nav ms-auto mt-3 mt-lg-0 d-flex align-items-lg-center gap-2">
                {% if user.is_authenticated %}
                    <span class="navbar-text text-white d-none d-lg-block me-3">Olá, {{ user.username }}!</span>
                    <span class="navbar-text text-white d-block d-lg-none mb-2">Olá, {{ user.username }}!</span>
                    
                    <form method="post" action="{% url 'logout' %}" class="w-100">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm w-100 w-lg-auto">Sair</button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-light btn-sm w-100 w-lg-auto mb-2 mb-lg-0" href="{% url 'login' %}">Entrar</a>
                    <a class="btn btn-light btn-sm w-100 w-lg-auto" href="{% url 'register' %}">Cadastrar</a>
                {% endif %}
            </div>
        </div>
    </div>
